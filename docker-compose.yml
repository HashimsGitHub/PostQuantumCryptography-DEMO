services:
  backend:
    build:
      context: ./backend
    container_name: pqc-demo-backend
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    container_name: pqc-demo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"